<svg width="2200" height="1400" viewBox="0 0 2200 1400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF0F3"/>
      <stop offset="100%" stop-color="#E4E6EC"/>
    </linearGradient>
    <linearGradient id="purpleBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9D5BFF"/>
      <stop offset="100%" stop-color="#6A3BE0"/>
    </linearGradient>
    <linearGradient id="boardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F6FB"/>
    </linearGradient>
    <linearGradient id="panelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0F2F7"/>
    </linearGradient>
    <linearGradient id="panelMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F5FA"/>
      <stop offset="100%" stop-color="#E8EBF2"/>
    </linearGradient>
    <linearGradient id="panelBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#121622"/>
      <stop offset="100%" stop-color="#090C14"/>
    </linearGradient>
    <pattern id="peakPatternIso" width="14" height="14" patternUnits="userSpaceOnUse" patternTransform="rotate(28)">
      <rect width="14" height="14" fill="#E9DBCB"/>
      <rect width="6" height="14" fill="#F4E8D9"/>
    </pattern>
    <filter id="dropSoft" x="-40%" y="-40%" width="200%" height="200%">
      <feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#1A1A1A" flood-opacity="0.23"/>
    </filter>
    <filter id="dropHard" x="-40%" y="-40%" width="200%" height="220%">
      <feDropShadow dx="0" dy="34" stdDeviation="20" flood-color="#080A10" flood-opacity="0.42"/>
    </filter>
    <style>
      .display { font-family: "Sora", "Avenir Next", "Segoe UI", sans-serif; }
      .ui { font-family: "Manrope", "Inter", "Segoe UI", sans-serif; }
      .mono { font-family: "JetBrains Mono", "SF Mono", Consolas, monospace; }
    </style>
  </defs>

  <rect width="2200" height="1400" fill="url(#bgMain)"/>
  <rect x="1770" width="430" height="1400" fill="url(#purpleBand)"/>

  <g filter="url(#dropSoft)">
    <rect x="80" y="175" width="1940" height="1100" rx="8" fill="url(#boardBg)"/>
  </g>

  <text x="124" y="122" class="display" font-size="48" fill="#1A1A1A">FO Studio Calendar • Isometric Exploded View</text>
  <text x="124" y="164" class="ui" font-size="20" fill="#1A1A1A" fill-opacity="0.52">Layered UI concept based on live booking calendar behaviors</text>

  <!-- Stack shadow -->
  <g transform="translate(320 350) skewX(-28) scale(1 0.72)">
    <rect x="40" y="420" width="1060" height="460" rx="12" fill="#04060C" opacity="0.98" filter="url(#dropHard)"/>
  </g>

  <!-- Exploded stack -->
  <g transform="translate(320 350) skewX(-28) scale(1 0.72)">
    <!-- Bottom frame -->
    <rect x="90" y="340" width="980" height="430" rx="16" fill="url(#panelBottom)"/>
    <rect x="104" y="354" width="952" height="402" rx="12" fill="#0E1321"/>

    <!-- Mid calendar layer -->
    <g>
      <rect x="120" y="245" width="980" height="430" rx="16" fill="url(#panelMid)" stroke="#1A1A1A" stroke-opacity="0.14"/>
      <rect x="138" y="270" width="944" height="380" rx="10" fill="#F3F0E9" stroke="#1A1A1A" stroke-opacity="0.1"/>
      <rect x="138" y="270" width="206" height="380" fill="#EFD4DC" fill-opacity="0.8"/>

      <line x1="344" y1="270" x2="344" y2="650" stroke="#1A1A1A" stroke-opacity="0.1"/>
      <line x1="512" y1="270" x2="512" y2="650" stroke="#1A1A1A" stroke-opacity="0.1"/>
      <line x1="680" y1="270" x2="680" y2="650" stroke="#1A1A1A" stroke-opacity="0.1"/>
      <line x1="848" y1="270" x2="848" y2="650" stroke="#1A1A1A" stroke-opacity="0.1"/>
      <line x1="1016" y1="270" x2="1016" y2="650" stroke="#1A1A1A" stroke-opacity="0.1"/>

      <line x1="138" y1="320" x2="1082" y2="320" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="370" x2="1082" y2="370" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="420" x2="1082" y2="420" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="470" x2="1082" y2="470" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="520" x2="1082" y2="520" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="570" x2="1082" y2="570" stroke="#1A1A1A" stroke-opacity="0.08"/>
      <line x1="138" y1="620" x2="1082" y2="620" stroke="#1A1A1A" stroke-opacity="0.08"/>

      <rect x="344" y="470" width="336" height="140" fill="url(#peakPatternIso)"/>

      <rect x="520" y="470" width="150" height="66" rx="10" fill="#091735"/>
      <rect x="520" y="540" width="150" height="66" rx="10" fill="#091735"/>
      <rect x="675" y="470" width="150" height="136" rx="10" fill="#091735"/>
      <rect x="835" y="470" width="150" height="66" rx="10" fill="#091735"/>
      <rect x="835" y="540" width="150" height="66" rx="10" fill="#091735"/>

      <rect x="346" y="310" width="12" height="204" rx="6" fill="#F09C0B"/>
      <rect x="322" y="600" width="12" height="100" rx="6" fill="#F09C0B"/>
    </g>

    <!-- Top shell / chrome layer -->
    <g>
      <rect x="150" y="150" width="980" height="430" rx="16" fill="url(#panelTop)" stroke="#1A1A1A" stroke-opacity="0.16"/>
      <rect x="150" y="150" width="980" height="74" rx="16" fill="#FFFFFF" fill-opacity="0.7"/>
      <line x1="150" y1="224" x2="1130" y2="224" stroke="#1A1A1A" stroke-opacity="0.1"/>

      <text x="178" y="196" class="display" font-size="34" fill="#1A1A1A">Book Studio</text>
      <text x="178" y="218" class="ui" font-size="13" fill="#1A1A1A" fill-opacity="0.5">30-minute increments • reschedule requires 24h notice</text>

      <rect x="176" y="242" width="940" height="320" rx="10" fill="#F5E8ED"/>
      <text x="198" y="286" class="display" font-size="44" fill="#1A1A1A">Mar 29 – Apr 4, 2026</text>

      <rect x="846" y="262" width="190" height="28" rx="14" fill="#E3C197"/>
      <text x="862" y="281" class="ui" font-size="11" fill="#6A4121">Peak Mon/Tue/Wed/Thu</text>
      <rect x="1040" y="262" width="76" height="28" rx="14" fill="#EACFD6"/>
      <text x="1055" y="281" class="ui" font-size="11" fill="#6A3241">3:53 PM</text>

      <rect x="186" y="304" width="32" height="28" rx="7" fill="#1E2536"/>
      <rect x="222" y="304" width="32" height="28" rx="7" fill="#1E2536"/>
      <rect x="262" y="304" width="58" height="28" rx="9" fill="#3A455B"/>
      <text x="282" y="323" class="ui" font-size="12" fill="#FCFAED">Today</text>

      <rect x="1004" y="304" width="40" height="28" rx="12" fill="#1E2536"/>
      <rect x="1048" y="304" width="40" height="28" rx="12" fill="#FC3F64"/>
      <rect x="1092" y="304" width="30" height="28" rx="12" fill="#1E2536"/>
      <text x="1012" y="323" class="ui" font-size="10" fill="#FCFAED">M</text>
      <text x="1058" y="323" class="ui" font-size="10" fill="#FCFAED">W</text>
      <text x="1100" y="323" class="ui" font-size="10" fill="#FCFAED">D</text>
    </g>

    <!-- Floating action layer -->
    <g opacity="0.95">
      <rect x="440" y="80" width="360" height="86" rx="12" fill="#0F1424"/>
      <text x="464" y="112" class="ui" font-size="14" fill="#FCFAED">Manage Booking</text>
      <text x="464" y="136" class="mono" font-size="12" fill="#FCFAED" fill-opacity="0.8">Active • ends 6:00 PM • extension eligible</text>
      <rect x="696" y="98" width="88" height="30" rx="9" fill="#FC3F64"/>
      <text x="716" y="118" class="ui" font-size="11" fill="#FCFAED">+30 min</text>
    </g>
  </g>

  <!-- Callouts -->
  <g>
    <path d="M1038 314H1410" stroke="#1A1A1A" stroke-opacity="0.65" stroke-width="2"/>
    <circle cx="1038" cy="314" r="7" fill="#5D84FF"/>
    <text x="1428" y="322" class="display" font-size="58" fill="#1A1A1A" fill-opacity="0.78">ACTION LAYER</text>
    <rect x="1430" y="348" width="610" height="156" rx="6" fill="#F8FAFF" stroke="#6CC8F0" stroke-width="2"/>
    <text x="1458" y="390" class="ui" font-size="23" fill="#1A1A1A" font-weight="700">EXTEND + RESCHEDULE STATE</text>
    <text x="1458" y="430" class="ui" font-size="14" fill="#1A1A1A" fill-opacity="0.76">Floating management card for active booking actions</text>
    <text x="1458" y="468" class="mono" font-size="12" fill="#1A1A1A" fill-opacity="0.64">availability + hold ownership gates</text>

    <path d="M1220 436H1410" stroke="#1A1A1A" stroke-opacity="0.65" stroke-width="2"/>
    <circle cx="1220" cy="436" r="7" fill="#5D84FF"/>
    <text x="1428" y="562" class="display" font-size="58" fill="#1A1A1A" fill-opacity="0.78">TOP SHELL</text>
    <rect x="1430" y="588" width="610" height="156" rx="6" fill="#F8FAFF" stroke="#6CC8F0" stroke-width="2"/>
    <text x="1458" y="630" class="ui" font-size="23" fill="#1A1A1A" font-weight="700">BOOKING UI CHROME</text>
    <text x="1458" y="670" class="ui" font-size="14" fill="#1A1A1A" fill-opacity="0.76">Week/day toggles, date range, live update markers</text>
    <text x="1458" y="708" class="mono" font-size="12" fill="#1A1A1A" fill-opacity="0.64">production calendar layout + controls</text>

    <path d="M1168 650H1410" stroke="#1A1A1A" stroke-opacity="0.65" stroke-width="2"/>
    <circle cx="1168" cy="650" r="7" fill="#5D84FF"/>
    <text x="1428" y="804" class="display" font-size="58" fill="#1A1A1A" fill-opacity="0.78">GRID LAYER</text>
    <rect x="1430" y="830" width="610" height="190" rx="6" fill="#F8FAFF" stroke="#6CC8F0" stroke-width="2"/>
    <text x="1458" y="872" class="ui" font-size="23" fill="#1A1A1A" font-weight="700">EVENTS + PEAK OVERLAY</text>
    <text x="1458" y="912" class="ui" font-size="14" fill="#1A1A1A" fill-opacity="0.76">Blocked slots, hold windows, and peak stripe coverage</text>
    <text x="1458" y="950" class="mono" font-size="12" fill="#1A1A1A" fill-opacity="0.64">cards/stripes mirror the live booking surface</text>
    <text x="1458" y="986" class="mono" font-size="12" fill="#1A1A1A" fill-opacity="0.64">navy block events + amber availability indicators</text>
  </g>
</svg>
