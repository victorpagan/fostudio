hero:
  kicker: Membership studio access
  headline: Pick the studio membership that fits the way you actually work.
  subheadline: This is a 24/7 turnkey studio built for photographers and small-to-mid crews. Book the plan that matches your volume, then use the space like it was made for production days, not paperwork.
  primaryCta:
    label: See Availability
    to: /calendar
  secondaryCta:
    label: Explore Memberships
    to: /memberships
  waitlistCtaLabel: Join the waitlist
  chips:
    - 24/7 photo studio access
    - Gear + consumables included
    - No startup fees
infoCard:
  title: A focused production studio built for you.
  body: We keep the workflow simple, the access flexible, and the monthly cost predictable so you and your crew can keep shooting without operational drag. Run production through a high-quality dashboard with live calendar visibility, rescheduling, booking extensions, and overnight holds.
  affordabilityNote: Built to stay affordable for recurring production, with ground-floor loading and easier parking than the typical downtown studio run.
  features:
    - 25x30 ft cyclorama with 20+ ft ceilings for commercial and editorial setups
    - As short as 30 minute bookings for tests, pickups, and pre setups
    - High quality booking dashboard with live calendar, booking extensions, and overnight setup holds
    - Built by working professional photographers so you always know we value our space
spotlight:
  label: PRODUCTION FIRST VALUE
  title: The turnkey studio that keeps you on track.
  body: Our members dashboard with live calendar and booking suite makes things simple. Reserve as short as a 30 minute session or as long as an entire day.
  statValue: Booking
  statLabel: Made Easy
  cta:
    label: See Availability
    to: /calendar
tiersPreview:
  title: Membership tier preview
  subtitle: Start with the plan that matches your current volume. You can always move up as your schedule grows.
  items:
    - id: creator
      title: Creator
      body: A practical fit for lighter monthly volume, test sessions, and smaller recurring shoots. Made for the amateur or even the pro who wants a space to be creative.
      buttonLabel: Explore Creator plan
    - id: pro
      title: Pro
      body: For repeat client production that needs stronger booking windows and has a steadier weekly volume.
      buttonLabel: Explore Pro plan
    - id: studio_plus
      title: Studio+
      body: Priority focused access for heavier production months and multi-day coordination. For those who need the most time and flexibility throughout the week.
      buttonLabel: Explore Studio+ plan
