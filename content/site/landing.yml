infoCard:
  title: A focused production studio built for repeat, real-world shoots.
  body: We keep the workflow simple, the access flexible, and the monthly cost predictable so small-to-mid crews can keep shooting without operational drag. Run production through a high-quality dashboard with live calendar visibility, rescheduling, extensions, and holds. Reserve in 30-minute increments and keep setup continuity without adding line-item friction to every session.
  affordabilityNote: Built to stay affordable for recurring production, with ground-floor loading and easier parking than the typical downtown studio run.
  features:
    - 25x30 ft cyclorama with 20+ ft ceilings for commercial and editorial setups
    - 30-minute booking increments for tests, pickups, and tighter production days
    - High-quality booking dashboard with live calendar, extensions, and holds
    - Ground-floor access with practical loading, ample parking, and included core gear plus baseline consumables
spotlight:
  label: PRODUCTION-FIRST VALUE
  title: A turnkey studio that keeps your shoots moving and your overhead in check.
  body: Run production through a high-quality dashboard with live calendar visibility, rescheduling, extensions, and holds. Reserve in 30-minute increments and keep setup continuity without adding line-item friction to every session.
